name: Daily Content Maintenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

concurrency:
  group: content-maintenance-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  maintain-content:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily maintenance
        env:
          MAX_NEW_PRODUCTS: "1"
          MAX_PRODUCT_REFRESHES: "2"
          MAX_NEW_GUIDES: "0"
        run: npm run content:maintain

      - name: Regenerate content
        run: npm run content:build

      - name: Build site
        run: npm run build

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/source/products.source.json src/data/source/roundups.source.json src/data/source/content-map.json src/data/source/product-backlog.json src/data/source/product-refresh-backlog.json src/data/source/guide-backlog.json src/data/generated reports
          git commit -m "Run daily content maintenance"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
