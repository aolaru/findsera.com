name: Weekly Guide Publish

on:
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-guide:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run weekly guide publish
        env:
          MAX_NEW_PRODUCTS: "0"
          MAX_PRODUCT_REFRESHES: "0"
          MAX_NEW_GUIDES: "1"
        run: npm run content:maintain

      - name: Regenerate content
        run: npm run content:build

      - name: Build site
        run: npm run build

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/source/products.source.json src/data/source/roundups.source.json src/data/source/product-backlog.json src/data/source/product-refresh-backlog.json src/data/source/guide-backlog.json src/data/generated reports
          git commit -m "Publish weekly guide"
          git push origin HEAD:main
